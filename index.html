<style>

canvas#canvas { display:block; }

  border:1px solid rgba(0,255,136,0.2);

}
canvas#minimap { display:block; image-rendering:pixelated; }

#flash {

  background:rgba(255,50,50,0.45);

}

#go-btn:hover { background:rgba(255,50,50,0.1); }

/* DEV 패널 */

.dev-section { color:#555; font-size:0.52rem; text-transform:uppercase; letter-spacing:0.1em; margin:7px 0 3px; }
.dev-row { display:flex; justify-content:space-between; align-items:center; gap:6px; margin:3px 0; }
.dev-row label { font-size:0.58rem; color:#bbb; flex:1; }
.dev-row input[type=range] { width:65px; accent-color:#00ff88; cursor:pointer; }
.dev-val { font-size:0.58rem; color:#00ff88; min-width:28px; text-align:right; }
.dev-btn {
  background:none; border:1px solid #333; color:#bbb;
  font-family:monospace; font-size:0.56rem;
  padding:3px 6px; cursor:pointer; border-radius:2px;
  width:100%; margin-top:4px; text-align:left;
}
.dev-btn:hover { border-color:#00ff88; color:#00ff88; }

.dev-info span { color:#00ff88; }
</style>

<body>

        막다른길: <span id="di-dead">0</span>개<br>

<script src="config.js"></script>
<script>
// ================================================================
//  index.html — OUTBREAK ZONE Step 2-A
//  Step 1 봉인 완료
//  추가:
//  ① 지뢰 타일 배치 (밀도 설정 가능)
//  ② 지뢰 밟으면 HP -1 + 플래시 효과
//  ③ HP 하트 실제 연동
//  ④ 게임오버 화면 (HP 0)
//  ⑤ 막다른 길 끝 보장 공간 (아이템 예약)
// ================================================================

// ── 타일 상수 ────────────────────────────────────────────────────
const T = { WALL:0, FLOOR:1, MINE:2 };

// ── 맵 생성 ──────────────────────────────────────────────────────
function generateMap() {
  let sz = CONFIG.map.size;
  if (sz % 2 === 0) sz++;
  const W = sz, H = sz;

  // 최대 10회 시도 (막다른 길 비율 체크)
  for (let attempt = 0; attempt < 10; attempt++) {
    const result = _buildMap(W, H);
    if (result) return result;
  }
  // 10회 실패 시 마지막 결과 그냥 사용
  return _buildMap(W, H, true);
}

function _buildMap(W, H, force = false) {
  const tiles = new Uint8Array(W * H).fill(T.WALL);
  const idx = (x,y) => y*W+x;
  const get = (x,y) => tiles[idx(x,y)];
  const set = (x,y,v) => { tiles[idx(x,y)] = v; };

  // 재귀 백트래커 미로
  function carve(x, y) {
    set(x, y, T.FLOOR);
    const dirs = shuffle([[0,-2],[2,0],[0,2],[-2,0]]);
    for (const [dx,dy] of dirs) {
      const nx=x+dx, ny=y+dy;
      if (nx<=0||nx>=W-1||ny<=0||ny>=H-1) continue;
      if (get(nx,ny) !== T.WALL) continue;
      set(x+dx/2, y+dy/2, T.FLOOR);
      carve(nx, ny);
    }
  }
  carve(1, 1);

  // 루프 경로 추가
  let added=0, tries=0;
  while (added < CONFIG.map.loopPaths && tries < 400) {
    tries++;
    const x = 1 + Math.floor(Math.random()*Math.floor((W-2)/2))*2;
    const y = 1 + Math.floor(Math.random()*Math.floor((H-2)/2))*2;
    const [dx,dy] = [[1,0],[0,1]][Math.floor(Math.random()*2)];
    const mx=x+dx, my=y+dy, nx2=x+dx*2, ny2=y+dy*2;
    if (nx2<=0||nx2>=W-1||ny2<=0||ny2>=H-1) continue;
    if (get(mx,my) !== T.WALL) continue;
    if (get(nx2,ny2) !== T.FLOOR) continue;
    set(mx, my, T.FLOOR);
    added++;
  }

  // 막다른 길 비율 계산
  // 막다른 길 = 연결된 바닥 타일이 1개뿐인 바닥 타일
  let floorCount = 0, deadEndCount = 0;
  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    if (get(x,y) !== T.FLOOR) continue;
    floorCount++;
    let neighbors = 0;
    for (const [dx,dy] of [[0,-1],[1,0],[0,1],[-1,0]]) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0&&nx<W&&ny>=0&&ny<H&&get(nx,ny)===T.FLOOR) neighbors++;
    }
    if (neighbors === 1) deadEndCount++;
  }

  const deadEndRatio = deadEndCount / (floorCount || 1);

  // 막다른 길 비율 초과 시 재시도 (force=true면 통과)
  if (!force && deadEndRatio > CONFIG.map.deadEndMax) return null;

  // 지뢰 배치
  // 스폰 주변 안전 반경 확보 (3×3)
  const safeSet = new Set();
  for (let dy=-2; dy<=2; dy++)
    for (let dx=-2; dx<=2; dx++)
      safeSet.add(`${1+dx},${1+dy}`);

  // 막다른 길 위치 수집 (나중에 아이템 배치용)
  const deadEnds = [];
  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    if (get(x,y) !== T.FLOOR) continue;
    if (safeSet.has(`${x},${y}`)) continue;
    let neighbors = 0;
    for (const [ddx,ddy] of [[0,-1],[1,0],[0,1],[-1,0]]) {
      const nnx=x+ddx, nny=y+ddy;
      if (nnx>=0&&nnx<W&&nny>=0&&nny<H&&get(nnx,nny)===T.FLOOR) neighbors++;
    }
    if (neighbors === 1) deadEnds.push([x,y]);
  }

  // 지뢰 배치 (FLOOR 타일 중 안전 구역 제외)
  let mineCount = 0;
  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    if (get(x,y) !== T.FLOOR) continue;
    if (safeSet.has(`${x},${y}`)) continue;
    if (Math.random() * 100 < CONFIG.mine.density) {
      set(x, y, T.MINE);
      mineCount++;
    }
  }

  // 지뢰 숫자 계산 (FLOOR/MINE 타일에 주변 지뢰 수 저장)
  const numbers = new Uint8Array(W * H);
  for (let y=0; y<H; y++) for (let x=0; x<W; x++) {
    if (get(x,y) === T.WALL) continue;
    let cnt = 0;
    for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
      if (dx===0&&dy===0) continue;
      const nx=x+dx, ny=y+dy;
      if (nx>=0&&nx<W&&ny>=0&&ny<H&&get(nx,ny)===T.MINE) cnt++;
    }
    numbers[idx(x,y)] = cnt;
  }

  return { tiles, numbers, width:W, height:H,
           floorCount, deadEndCount, deadEndRatio,
           mineCount, deadEnds };
}

function shuffle(arr) {
  const a=[...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ── 상태 ─────────────────────────────────────────────────────────
let MAP     = null;
let VISITED = null;  // 누적 방문 타일 (미니맵용)
let VISIBLE = null;  // 현재 시야 타일 (매 프레임 갱신)

let player = {
  tx:1, ty:1,
  px:0, py:0,
  targetX:0, targetY:0,
  moving:false,
  facing:'down',
  hp:3, maxHp:3,
  dead:false,
};

// 런 통계
let stats = { minesHit:0, startTime:0 };

let camX=0, camY=0;
let moveTimer=0;
let devRevealMines = false; // DEV: 지뢰 표시

// ── 캔버스 ───────────────────────────────────────────────────────
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const mmCanvas  = document.getElementById('minimap');
const mmCtx     = mmCanvas.getContext('2d');
let W_px, H_px;

function resize() {
  const area = document.getElementById('game-area');
  W_px = canvas.width  = area.clientWidth;
  H_px = canvas.height = area.clientHeight;
  // 미니맵 크기 설정
  mmCanvas.width  = mmCanvas.height  = CONFIG.minimap.size;
}
window.addEventListener('resize', resize);

// ── 초기화 ───────────────────────────────────────────────────────
function init() {
  MAP     = generateMap();
  VISITED = new Uint8Array(MAP.width * MAP.height);
  VISIBLE = new Uint8Array(MAP.width * MAP.height);

  player.tx=1; player.ty=1;
  player.px = 1*CONFIG.map.tileSize;
  player.py = 1*CONFIG.map.tileSize;
  player.targetX = player.px;
  player.targetY = player.py;
  player.moving  = false;
  player.facing  = 'down';
  player.hp      = CONFIG.player.maxHp;
  player.maxHp   = CONFIG.player.maxHp;
  player.dead    = false;
  stats = { minesHit:0, startTime:Date.now() };
  document.getElementById('gameover').classList.remove('show');

  revealAround(1, 1, CONFIG.player.visionRad);

  camX = player.px + CONFIG.map.tileSize/2 - W_px/2;
  camY = player.py + CONFIG.map.tileSize/2 - H_px/2;
}

// ── LOS 시야 ─────────────────────────────────────────────────────
// 원칙: 미니맵에 표시되는 정보 = 시야(VISITED)와 완전히 동일
function revealAround(tx, ty, radius) {
  const { tiles, width, height } = MAP;
  // 현재 시야 초기화 (매 호출마다 갱신)
  VISIBLE.fill(0);
  for (let dy=-radius; dy<=radius; dy++) {
    for (let dx=-radius; dx<=radius; dx++) {
      const nx=tx+dx, ny=ty+dy;
      if (nx<0||nx>=width||ny<0||ny>=height) continue;
      if (Math.hypot(dx,dy) > radius+0.5) continue;
      if (hasLOS(tx,ty,nx,ny)) {
        VISITED[ny*width+nx]=1; // 누적 방문
        VISIBLE[ny*width+nx]=1; // 현재 시야
      }
    }
  }
}

function hasLOS(x0,y0,x1,y1) {
  const { tiles, width } = MAP;
  const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
  let x=x0, y=y0;
  const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
  let err=dx-dy;
  while (x!==x1||y!==y1) {
    if (tiles[y*width+x]===T.WALL) return false;
    const e2=2*err;
    if (e2>-dy){err-=dy;x+=sx;}
    if (e2< dx){err+=dx;y+=sy;}
  }
  return true;
}

// ── 입력 ─────────────────────────────────────────────────────────
const KEYS = {};

window.addEventListener('keydown', e => {
  KEYS[e.code] = true;
  e.preventDefault();

  // 방향키 — facing 즉시 업데이트 (이동 가능 여부 무관)
  const dir = codeToDir(e.code);
  if (dir) {
    updateFacing(dir.dx, dir.dy);
    // 이동 가능하면 이동
    if (!player.moving && moveTimer <= 0) {
      tryMove(dir.dx, dir.dy);
    }
  }
});
window.addEventListener('keyup', e => { KEYS[e.code] = false; });

function codeToDir(code) {
  if (code==='KeyW'||code==='ArrowUp')    return {dx:0,  dy:-1};
  if (code==='KeyS'||code==='ArrowDown')  return {dx:0,  dy: 1};
  if (code==='KeyA'||code==='ArrowLeft')  return {dx:-1, dy: 0};
  if (code==='KeyD'||code==='ArrowRight') return {dx: 1, dy: 0};
  return null;
}

// facing 업데이트 — 이동 성공 여부와 무관하게 항상 실행
function updateFacing(dx, dy) {
  if      (dy < 0) player.facing = 'up';
  else if (dy > 0) player.facing = 'down';
  else if (dx < 0) player.facing = 'left';
  else if (dx > 0) player.facing = 'right';
}

// 꾹 누를 때 반복 이동 (4방향 우선순위: 상>하>좌>우)
function getInputDir() {
  if (KEYS['KeyW']||KEYS['ArrowUp'])    return {dx:0,  dy:-1};
  if (KEYS['KeyS']||KEYS['ArrowDown'])  return {dx:0,  dy: 1};
  if (KEYS['KeyA']||KEYS['ArrowLeft'])  return {dx:-1, dy: 0};
  if (KEYS['KeyD']||KEYS['ArrowRight']) return {dx: 1, dy: 0};
  return null;
}

function tryMove(dx, dy) {
  if (player.dead) return false;
  const nx=player.tx+dx, ny=player.ty+dy;
  if (nx<0||nx>=MAP.width||ny<0||ny>=MAP.height) return false;
  if (MAP.tiles[ny*MAP.width+nx]===T.WALL) return false;

  player.tx=nx; player.ty=ny;
  player.targetX=nx*CONFIG.map.tileSize;
  player.targetY=ny*CONFIG.map.tileSize;
  player.moving=true;
  moveTimer=CONFIG.player.moveDelay;
  revealAround(nx, ny, CONFIG.player.visionRad);
  onStep(nx, ny); // 타일 효과
  return true;
}

// ── 타일 효과 ─────────────────────────────────────────────────────
function onStep(tx, ty) {
  const t = MAP.tiles[ty * MAP.width + tx];
  if (t === T.MINE) {
    MAP.tiles[ty * MAP.width + tx] = T.FLOOR; // 지뢰 제거 (폭발)
    player.hp--;
    stats.minesHit++;
    // 피격 플래시
    const fl = document.getElementById('flash');
    fl.style.opacity = '1';
    setTimeout(() => fl.style.opacity = '0', 150);
    // HP 0 → 게임오버
    if (player.hp <= 0) {
      player.dead = true;
      triggerGameOver();
    }
  }
}

function triggerGameOver() {
  const elapsed = Math.floor((Date.now() - stats.startTime) / 1000);
  document.getElementById('go-mines').textContent = stats.minesHit;
  document.getElementById('go-time').textContent  = elapsed + '초';
  document.getElementById('go-rooms').textContent = '1'; // Step 3에서 업데이트
  document.getElementById('gameover').classList.add('show');
}

function handleInput(dt) {
  moveTimer = Math.max(0, moveTimer-dt);
  if (player.moving || moveTimer > 0) return;

  const dir = getInputDir();
  if (dir) {
    updateFacing(dir.dx, dir.dy); // 꾹 누를 때도 facing 유지
    tryMove(dir.dx, dir.dy);
  }
}

// ── 업데이트 ─────────────────────────────────────────────────────
function update(dt) {
  if (player.moving) {
    const ts   = CONFIG.map.tileSize;
    const spd  = ts / CONFIG.player.moveDelay * dt;
    const dx   = player.targetX - player.px;
    const dy   = player.targetY - player.py;
    const dist = Math.hypot(dx,dy);
    if (dist <= spd) {
      player.px=player.targetX; player.py=player.targetY;
      player.moving=false;
    } else {
      player.px+=dx/dist*spd; player.py+=dy/dist*spd;
    }
  }

  const ts = CONFIG.map.tileSize;
  const tcx = player.px+ts/2-W_px/2;
  const tcy = player.py+ts/2-H_px/2;
  camX += (tcx-camX)*CONFIG.camera.smooth;
  camY += (tcy-camY)*CONFIG.camera.smooth;
}

// ── 게임 렌더링 ───────────────────────────────────────────────────
function render() {
  const ts = CONFIG.map.tileSize;
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W_px,H_px);

  ctx.save();
  ctx.translate(-camX, -camY);

  const tx0=Math.max(0,Math.floor(camX/ts)-1);
  const ty0=Math.max(0,Math.floor(camY/ts)-1);
  const tx1=Math.min(MAP.width,  Math.ceil((camX+W_px)/ts)+1);
  const ty1=Math.min(MAP.height, Math.ceil((camY+H_px)/ts)+1);

  for (let ty=ty0;ty<ty1;ty++) {
    for (let tx=tx0;tx<tx1;tx++) {
      const sx=tx*ts, sy=ty*ts;
      const vis  = VISITED[ty*MAP.width+tx];
      const tile = MAP.tiles[ty*MAP.width+tx];

      // 3단계 시야:
      // 0 = 미방문 (암흑)
      // 1 = 방문했지만 현재 시야 밖 (그림자)
      // 2 = 현재 시야 안 (완전 밝음)
      const vis2 = VISIBLE[ty*MAP.width+tx]; // 현재 시야

      if (!vis) {
        // 미방문 — 완전 암흑
        ctx.fillStyle='#050505';
        ctx.fillRect(sx,sy,ts,ts);
        continue;
      }

      if (tile===T.WALL) {
        if (vis2) {
          // 현재 시야 — 완전 밝음
          ctx.fillStyle='#1c1c1c';
          ctx.fillRect(sx,sy,ts,ts);
          ctx.fillStyle='#141414';
          ctx.fillRect(sx+1,sy+1,ts-2,ts-2);
          ctx.strokeStyle='#242424';
          ctx.lineWidth=1;
          ctx.strokeRect(sx+0.5,sy+0.5,ts-1,ts-1);
        } else {
          // 방문했지만 시야 밖 — 그림자 (형태만)
          ctx.fillStyle='#0e0e0e';
          ctx.fillRect(sx,sy,ts,ts);
          ctx.fillStyle='#0a0a0a';
          ctx.fillRect(sx+1,sy+1,ts-2,ts-2);
        }
      } else {
        if (vis2) {
          // 현재 시야 — 완전 밝음
          ctx.fillStyle='#1e1e1e';
          ctx.fillRect(sx,sy,ts,ts);
          ctx.strokeStyle='#252525';
          ctx.lineWidth=0.5;
          ctx.strokeRect(sx,sy,ts,ts);
        } else {
          // 방문했지만 시야 밖 — 그림자
          ctx.fillStyle='#0f0f0f';
          ctx.fillRect(sx,sy,ts,ts);
        }

      // 지뢰 — 시야 안에서만 표시 (소나 없이는 X 표시 안 함)
      // Step 2-B에서 소나 스캔 시 숫자 표시 추가
      // 개발자 모드에서만 표시 (DEV 패널 열려있을 때)
      if (tile === T.MINE && vis2 && devRevealMines) {
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = 'rgba(255,50,50,0.15)';
        ctx.fillRect(sx,sy,ts,ts);
        ctx.strokeStyle = '#ff3333';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(sx+8,sy+8); ctx.lineTo(sx+ts-8,sy+ts-8);
        ctx.moveTo(sx+ts-8,sy+8); ctx.lineTo(sx+8,sy+ts-8);
        ctx.stroke();
        ctx.restore();
      }
      }
    }
  }

  renderPlayer(ts);
  ctx.restore();
  renderVignette();
}

function renderPlayer(ts) {
  const cx = player.px + ts/2;
  const cy = player.py + ts/2;
  const r  = ts * 0.34;

  // 후광
  ctx.save();
  ctx.globalAlpha=0.1;
  ctx.beginPath(); ctx.arc(cx,cy,r*1.6,0,Math.PI*2);
  ctx.fillStyle='#00ff88'; ctx.fill();
  ctx.restore();

  // 몸통
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#00ff88';
  ctx.shadowBlur=10; ctx.shadowColor='#00ff88';
  ctx.fill(); ctx.shadowBlur=0;

  // 방향 도트
  const a = {up:-Math.PI/2, down:Math.PI/2, left:Math.PI, right:0}[player.facing]??Math.PI/2;
  ctx.beginPath();
  ctx.arc(cx+Math.cos(a)*r*0.52, cy+Math.sin(a)*r*0.52, r*0.22, 0, Math.PI*2);
  ctx.fillStyle='#003322'; ctx.fill();
}

function renderVignette() {
  const g=ctx.createRadialGradient(W_px/2,H_px/2,H_px*0.18,W_px/2,H_px/2,H_px*0.78);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W_px,H_px);
}

// ── 미니맵 렌더링 ─────────────────────────────────────────────────
// 원칙: 미니맵 표시 = VISITED(시야)와 완전히 동일
// 나중에 소나 탐지 정보, 레이더 정보도 VISITED 기반으로 연동
function renderMinimap(targetCtx, targetSize) {
  const { tiles, width, height } = MAP;
  const s = targetSize / Math.max(width, height);

  targetCtx.fillStyle='#000';
  targetCtx.fillRect(0,0,targetSize,targetSize);

  for (let ty=0;ty<height;ty++) {
    for (let tx=0;tx<width;tx++) {
      if (!VISITED[ty*width+tx]) continue; // 방문 안 한 곳 = 미표시

      const tile = tiles[ty*width+tx];
      targetCtx.fillStyle = tile===T.WALL ? '#1a1a1a' : '#303030';
      targetCtx.fillRect(tx*s, ty*s, s+0.5, s+0.5);
    }
  }

  // 플레이어 위치 (항상 표시)
  const ps = Math.max(s, 3);
  targetCtx.fillStyle='#00ff88';
  targetCtx.fillRect(
    player.tx*s - ps/2 + s/2,
    player.ty*s - ps/2 + s/2,
    ps, ps
  );

  // Step 2 이후 추가 예정:
  // 소나 탐지 지뢰 → 붉은 점 (서서히 흐려짐)
  // 발견한 아이템 → 노란 점
  // 출구 위치 → 파란 점
  // 레이더 탐지 좀비 → 주황 점 (3초 후 소멸)
}

// ── HUD ──────────────────────────────────────────────────────────
let visitedCount = 0;

function updateHUD() {
  visitedCount = 0;
  for (let i=0;i<VISITED.length;i++) if (VISITED[i]) visitedCount++;

  document.getElementById('hud-pos').textContent =
    `${player.tx}, ${player.ty}`;
  document.getElementById('hud-explored').textContent =
    `${Math.floor(visitedCount/MAP.floorCount*100)}%`;
  // HP 하트 실제 연동
  const hp    = Math.max(0, player.hp);
  const maxHp = player.maxHp;
  document.getElementById('hud-hp').textContent =
    '❤'.repeat(hp) + '🖤'.repeat(Math.max(0, maxHp - hp));
}

// ── DEV 정보 ─────────────────────────────────────────────────────
function updateDevInfo() {
  if (!document.getElementById('dev-panel').classList.contains('open')) return;
  const t = MAP.tiles[player.ty*MAP.width+player.tx];
  document.getElementById('di-fps').textContent     = fps;
  document.getElementById('di-tile').textContent    = t===T.WALL?'WALL':'FLOOR';
  document.getElementById('di-dead').textContent    =
    `${MAP.deadEndCount} (${Math.floor(MAP.deadEndRatio*100)}%)`;
  document.getElementById('di-mapsize').textContent = `${MAP.width}×${MAP.height}`;
  document.getElementById('di-mines').textContent  = MAP.mineCount;
  document.getElementById('di-hp').textContent     = `${player.hp}/${player.maxHp}`;
  document.getElementById('di-time').textContent    = Math.floor((Date.now()-startTime)/1000)+'s';
}

// ── DEV 패널 ─────────────────────────────────────────────────────
document.getElementById('dev-toggle').addEventListener('click', () => {
  document.getElementById('dev-panel').classList.toggle('open');
  document.getElementById('dev-toggle').classList.toggle('on');
  resize();
});

const sliders = [
  ['d-size',     () => { CONFIG.map.size       = parseInt(document.getElementById('d-size').value); }],
  ['d-tilesize', () => { CONFIG.map.tileSize   = parseInt(document.getElementById('d-tilesize').value); }],
  ['d-loops',    () => { CONFIG.map.loopPaths  = parseInt(document.getElementById('d-loops').value); }],
  ['d-delay',    () => { CONFIG.player.moveDelay  = parseFloat(document.getElementById('d-delay').value); }],
  ['d-vision',   () => { CONFIG.player.visionRad  = parseInt(document.getElementById('d-vision').value); }],
  ['d-cam',      () => { CONFIG.camera.smooth      = parseFloat(document.getElementById('d-cam').value); }],
  ['d-mine',     () => { CONFIG.mine.density    = parseInt(document.getElementById('d-mine').value); document.getElementById('d-mine-v').textContent = document.getElementById('d-mine').value + '%'; }],
  ['d-hp',       () => { CONFIG.player.maxHp   = parseInt(document.getElementById('d-hp').value); }],
];
sliders.forEach(([id, fn]) => {
  const el  = document.getElementById(id);
  const val = document.getElementById(id+'-v');
  el.addEventListener('input', () => { fn(); val.textContent=el.value; });
});

document.getElementById('d-regen').addEventListener('click', () => {
  init(); startTime=Date.now();
});
document.getElementById('d-reveal-mines').addEventListener('click', () => {
  devRevealMines = !devRevealMines;
  document.getElementById('d-reveal-mines').textContent =
    '💣 지뢰 표시 ' + (devRevealMines ? 'ON' : 'OFF');
});
document.getElementById('d-fullhp').addEventListener('click', () => {
  player.hp = player.maxHp;
  player.dead = false;
  document.getElementById('gameover').classList.remove('show');
});

// ── 메인 루프 ────────────────────────────────────────────────────
let lastTs=0, fps=0, frameCount=0, fpsTimer=0;
let startTime = Date.now();

function loop(ts) {
  const dt = Math.min((ts-lastTs)/1000, 0.1);
  lastTs=ts;

  frameCount++; fpsTimer+=dt;
  if (fpsTimer>=1){ fps=frameCount; frameCount=0; fpsTimer=0; }

  handleInput(dt);
  update(dt);
  render();

  // 미니맵 렌더링 (기본 + 확대)
  renderMinimap(mmCtx, CONFIG.minimap.size);

  updateHUD();
  updateDevInfo();

  requestAnimationFrame(loop);
}

// ── 게임오버 RETRY ───────────────────────────────────────────────
document.getElementById('go-btn').addEventListener('click', () => {
  init();
  startTime = Date.now();
});

// ── 시작 ─────────────────────────────────────────────────────────
resize();
init();
lastTs=performance.now();
requestAnimationFrame(loop);
</script>
